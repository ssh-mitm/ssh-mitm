<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 305">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <marker id="arr-dash" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- SSH Client -->
  <rect x="25" y="92" width="155" height="62" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="102" y="127" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="14" fill="#e2e8f0">SSH Client</text>

  <!-- SSH-MITM Proxy (highlighted) -->
  <rect x="283" y="82" width="204" height="86" rx="8" fill="#0f3460" stroke="#3b82f6" stroke-width="2"/>
  <text x="385" y="112" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="15" font-weight="bold" fill="#93c5fd">SSH-MITM Proxy</text>
  <text x="385" y="133" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="12" fill="#7dd3fc">intercepts · logs · mirrors</text>
  <text x="385" y="154" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="11" fill="#38bdf8">port 10022</text>

  <!-- Target SSH Server -->
  <rect x="590" y="92" width="160" height="62" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="670" y="118" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="13" fill="#e2e8f0">Target SSH</text>
  <text x="670" y="140" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="13" fill="#e2e8f0">Server</text>

  <!-- Auditor -->
  <rect x="283" y="218" width="204" height="65" rx="8" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <text x="385" y="246" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="14" fill="#86efac">Auditor</text>
  <text x="385" y="267" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="11" fill="#4ade80">mirror shell · logs</text>

  <!-- Arrow: Client → Proxy -->
  <line x1="181" y1="123" x2="281" y2="123"
        stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Arrow: Proxy → Target -->
  <line x1="488" y1="123" x2="588" y2="123"
        stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="538" y="113" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,Menlo,monospace"
        font-size="10" fill="#94a3b8">forwarded</text>

  <!-- Arrow: Proxy ↓ Auditor (dashed) -->
  <line x1="385" y1="169" x2="385" y2="216"
        stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,4"
        marker-end="url(#arr-dash)"/>
</svg>
