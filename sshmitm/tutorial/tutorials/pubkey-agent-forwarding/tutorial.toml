id          = "pubkey-agent-forwarding"
title       = "Public Key Auth & Agent Forwarding"
category    = "Authentication"
description = "Learn what SSH-MITM can see when public key auth and agent forwarding are used."
auth_type   = "publickey"

[[steps]]
id        = "mock-server"
title     = "Target server ready"
condition = "TRUE()"
hint_done = "The target server is running and ready."

[[steps]]
id           = "start-sshmitm"
title        = "Start SSH-MITM"
condition    = "PORT_OPEN(sshmitm_port)"
command      = "ssh-mitm server --remote-host 127.0.0.1 --remote-port {mock_port} --listen-port {sshmitm_port}"
hint_waiting = "Waiting for SSH-MITM to start on port {sshmitm_port}…"
hint_done    = "SSH-MITM is running on port {sshmitm_port}. ✓"

[[steps]]
id           = "verify"
title        = "Enter the intercepted key fingerprint"
condition    = 'USER_INPUT("pubkey_fingerprint")'
auto_connect = true
input_prompt = "Enter the SHA256 fingerprint shown in the SSH-MITM terminal:"
hint_waiting = "Look at the SSH-MITM terminal and enter the key fingerprint above."
hint_done    = "Correct! Tutorial complete. ✓"
