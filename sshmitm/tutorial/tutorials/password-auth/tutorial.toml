id          = "password-auth"
title       = "Password Authentication"
category    = "Authentication"
description = "Learn how SSH-MITM intercepts plaintext passwords."

[[steps]]
id        = "mock-server"
title     = "Target server ready"
condition = "TRUE()"
hint_done = "The target server is running and ready."

[[steps]]
id           = "start-sshmitm"
title        = "Start SSH-MITM"
condition    = "PORT_OPEN(sshmitm_port)"
command      = "ssh-mitm server --remote-host 127.0.0.1 --remote-port {mock_port} --listen-port {sshmitm_port}"
hint_waiting = "Waiting for SSH-MITM to start on port {sshmitm_port}…"
hint_done    = "SSH-MITM is running on port {sshmitm_port}. ✓"

[[steps]]
id           = "verify"
title        = "Enter the intercepted password"
condition    = 'USER_INPUT("password_value")'
auto_connect = true
input_prompt = "Enter the password shown in the SSH-MITM terminal:"
hint_waiting = "Look at the SSH-MITM terminal and enter the password above."
hint_done    = "Correct! Tutorial complete. ✓"

